name: Tests
on: [push, pull_request]
jobs:
  lint:
    name: Transpilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6

      - name: Install Node.js v18
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install dependencies
        run: pnpm i

      - name: Type Check
        run: tsc --noEmit